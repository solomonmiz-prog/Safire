<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAFIRE Product</title>
    <link rel="icon" type="image/svg+xml" href="images/favicon-diamond.svg">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="site-header">
        <a href="index.html" class="brand">SAFIRE</a>
        <div class="header-right">
            <a href="cart.html" class="cart-link">Cart <span id="cart-count" class="cart-count-badge">0</span></a>
        </div>
    </header>

    <main class="product-page">
        <a href="index.html" class="back-link">← Back to products</a>

        <section class="product-layout product" id="product-layout" hidden>
            <div class="media-stack">
                <div class="main-image-wrap" id="main-image-wrap">
                    <img id="main-image" src="" alt="Product image" draggable="false">
                    <div class="color-options-side" id="color-options"></div>
                </div>
                <div class="image-dots" id="image-dots"></div>
                <div class="thumbnail-row" id="thumbnail-row"></div>
            </div>

            <div class="info">
                <h1 id="product-name"></h1>
                <p class="price" id="product-price"></p>
                <p class="desc" id="product-description"></p>
                <div id="product-meta-row" style="display:flex;gap:16px;flex-wrap:wrap;align-items:center;margin-top:-4px;">
                    <p class="desc" id="product-gender" style="margin:0;font-weight:600;"></p>
                    <p class="desc" id="selected-color-label" style="margin:0;font-weight:600;"></p>
                </div>

                <div>
                    <p style="margin:0 0 8px;font-weight:700;">Select Size</p>
                    <div class="size-grid" id="size-grid"></div>
                </div>

                <button class="add-btn" id="add-to-cart-btn">Add to Cart</button>

                <div class="accordion">
                    <details>
                        <summary>Note</summary>
                        <p id="note-text"></p>
                    </details>
                    <details>
                        <summary>Details</summary>
                        <p id="details-text"></p>
                    </details>
                    <details>
                        <summary>Model</summary>
                        <p id="model-text"></p>
                    </details>
                    <details>
                        <summary>Features</summary>
                        <p id="features-text"></p>
                    </details>
                    <details>
                        <summary>Care Instructions</summary>
                        <p id="care-text"></p>
                    </details>
                    <details>
                        <summary>Fabric</summary>
                        <p id="fabric-text"></p>
                    </details>
                    <details id="size-guide-details">
                        <summary>Size Guide</summary>
                        <div id="size-guide-text"></div>
                    </details>
                </div>
            </div>
        </section>

        <p id="not-found" style="display:none;color:#666;">Product not found.</p>
    </main>

    <script src="https://js.stripe.com/v3/"></script>
    <script src="js/products.js?v=20260531f"></script>
    <script src="js/cart.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const productId = params.get('id');
        const product = products.find((item) => item.id === productId);

        const layout = document.getElementById('product-layout');
        const notFound = document.getElementById('not-found');

        function formatPrice(value) {
            return Math.round(Number(value) || 0).toString();
        }

        const PRODUCT_PAGE_SALE_OFF = 10;

        function getSalePrice(value) {
            return Math.max(0, (Number(value) || 0) - PRODUCT_PAGE_SALE_OFF);
        }

        function normalizeValue(value) {
            return String(value || '').trim().toLowerCase();
        }

        function normalizeColorKey(value) {
            return normalizeValue(value).split('/')[0].trim().replace(/\s+/g, '-');
        }

        function parseProductDetailSections(detailsText, careText) {
            const raw = String(detailsText || '').replace(/\r/g, '').trim();
            const paragraphs = raw.length > 0
                ? raw.split(/\n\s*\n+/).map((part) => part.trim()).filter(Boolean)
                : [];
            const allLines = raw.length > 0
                ? raw.split('\n').map((line) => line.trim()).filter(Boolean)
                : [];

            const headingKeys = new Set([
                'product code', 'model', 'gender', 'height', 'weight', 'size',
                'effects', 'fit', 'neckline', 'sleeve style', 'sleeve length', 'season', 'style',
                'material', 'fabric weight', 'thickness', 'elasticity', 'breathability'
            ]);

            function normalizeKey(line) {
                return String(line || '').toLowerCase().replace(/:$/, '').trim();
            }

            function isHeadingLine(line) {
                return headingKeys.has(normalizeKey(line));
            }

            function findValueForKey(lines, keyName) {
                const target = normalizeKey(keyName);
                for (let i = 0; i < lines.length; i += 1) {
                    const line = lines[i];
                    const lineKey = normalizeKey(line);
                    if (lineKey !== target) continue;

                    const colonIndex = line.indexOf(':');
                    if (colonIndex !== -1) {
                        const inlineValue = line.slice(colonIndex + 1).trim();
                        if (inlineValue) return inlineValue;
                    }

                    const next = lines[i + 1] ? lines[i + 1].trim() : '';
                    if (next && !isHeadingLine(next)) return next;
                    return '';
                }
                return '';
            }

            const sectionOrder = ['Note', 'Details', 'Gender', 'Model', 'Features', 'Care Instructions', 'Fabric'];
            const sections = {
                Note: '',
                Details: '',
                Gender: '',
                Model: '',
                Features: '',
                'Care Instructions': String(careText || '').trim(),
                Fabric: ''
            };

            const noteParts = [];
            if (paragraphs[0]) noteParts.push(paragraphs[0]);
            const warningParagraph = paragraphs.find((part) => {
                const value = part.toLowerCase();
                return value.includes('batch variations') || value.includes('minor batch differences') || value.includes('we appreciate your understanding') || value.includes('each piece is handcrafted');
            });
            if (warningParagraph && warningParagraph !== paragraphs[0]) {
                noteParts.push(warningParagraph);
            }
            sections.Note = noteParts.join('\n\n').trim();

            const productCode = findValueForKey(allLines, 'Product Code');
            if (productCode) {
                sections.Details += `Product Code: ${productCode}`;
            }

            const genderValue = findValueForKey(allLines, 'Gender');
            if (genderValue) {
                sections.Gender = genderValue;
            }

            const hasModelSignal = allLines.some((line) => normalizeKey(line) === 'model')
                || ['Height', 'Weight', 'Size'].some((key) => Boolean(findValueForKey(allLines, key)));

            const modelPairs = [];
            ['Gender', 'Height', 'Weight', 'Size'].forEach((key) => {
                const value = findValueForKey(allLines, key);
                if (value) modelPairs.push(`${key}: ${value}`);
            });
            if (hasModelSignal && modelPairs.length > 0) {
                sections.Model = modelPairs.join('\n');
            }

            const featurePairs = [];
            ['Effects', 'Fit', 'Neckline', 'Sleeve Style', 'Sleeve Length', 'Season', 'Style'].forEach((key) => {
                const value = findValueForKey(allLines, key);
                if (value) featurePairs.push(`${key}: ${value}`);
            });
            sections.Features = featurePairs.join('\n');

            const fabricPairs = [];
            ['Material', 'Fabric Weight', 'Thickness', 'Elasticity', 'Breathability'].forEach((key) => {
                const value = findValueForKey(allLines, key);
                if (value) fabricPairs.push(`${key}: ${value}`);
            });
            sections.Fabric = fabricPairs.join('\n');

            if (!sections.Details && paragraphs.length > 0) {
                sections.Details = paragraphs[0];
            }

            return sectionOrder.reduce((acc, sectionName) => {
                acc[sectionName] = String(sections[sectionName] || '').trim();
                return acc;
            }, {});
        }

        function setAccordionSection(contentId, text, shouldOpen = false) {
            const contentElement = document.getElementById(contentId);
            if (!contentElement) return;

            const detailsElement = contentElement.closest('details');
            const cleanedText = String(text || '').trim();

            if (!cleanedText) {
                contentElement.textContent = '';
                if (detailsElement) detailsElement.hidden = true;
                return;
            }

            contentElement.textContent = cleanedText;
            if (detailsElement) {
                detailsElement.hidden = false;
                detailsElement.open = !!shouldOpen;
            }
        }

        function setAccordionHTMLSection(contentId, html, shouldOpen = false) {
            const contentElement = document.getElementById(contentId);
            if (!contentElement) return;

            const detailsElement = contentElement.closest('details');
            const cleanedHTML = String(html || '').trim();

            if (!cleanedHTML) {
                contentElement.innerHTML = '';
                if (detailsElement) detailsElement.hidden = true;
                return;
            }

            contentElement.innerHTML = cleanedHTML;
            if (detailsElement) {
                detailsElement.hidden = false;
                detailsElement.open = !!shouldOpen;
            }
        }

        function setSizeGuideUnit(unit) {
            const contentElement = document.getElementById('size-guide-text');
            if (!contentElement) return;

            const nextUnit = unit === 'centimeters' ? 'centimeters' : 'inches';
            contentElement.dataset.activeUnit = nextUnit;

            contentElement.querySelectorAll('[data-size-unit]').forEach((button) => {
                const isActive = button.dataset.sizeUnit === nextUnit;
                button.setAttribute('aria-selected', String(isActive));
                button.classList.toggle('active', isActive);
                button.style.color = isActive ? '#111' : '#777';
                button.style.fontWeight = isActive ? '700' : '600';
                button.style.borderBottomColor = isActive ? '#111' : 'transparent';
            });

            contentElement.querySelectorAll('[data-size-panel]').forEach((panel) => {
                const isActive = panel.dataset.sizePanel === nextUnit;
                panel.hidden = !isActive;
            });
        }

        function buildSizeGuideHTML(sizeGuide) {
            if (!sizeGuide) return '';

            const section = (title, data, unitKey) => `
                <div data-size-panel="${unitKey}" style="margin-top: 18px;" hidden>
                    <h4 style="margin: 0 0 10px; font-size: 15px;">${title}</h4>
                    <div style="overflow-x: auto;">
                        <table style="width: 100%; border-collapse: collapse; min-width: 520px; font-size: 13px;">
                            <thead>
                                <tr>
                                    <th style="text-align: left; padding: 10px 8px; border-bottom: 1px solid #ddd;">Size</th>
                                    ${data.sizes.map((size) => `<th style="text-align: left; padding: 10px 8px; border-bottom: 1px solid #ddd;">${size}</th>`).join('')}
                                </tr>
                            </thead>
                            <tbody>
                                ${[
                                    ['Length', 'length'],
                                    ['Waist', 'waist'],
                                    ['Hip', 'hip'],
                                    ['Chest', 'chest'],
                                    ['Shoulder', 'shoulder'],
                                    ['Sleeve length', 'sleeveLength']
                                ].filter(([, key]) => Array.isArray(data[key]))
                                    .map(([label, key]) => `
                                <tr>
                                    <td style="padding: 10px 8px; border-bottom: 1px solid #eee; font-weight: 600;">${label}</td>
                                    ${data[key].map((value) => `<td style="padding: 10px 8px; border-bottom: 1px solid #eee;">${value}</td>`).join('')}
                                </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;

            const howToMeasure = `
                <div style="margin-top: 18px;">
                    <h4 style="margin: 0 0 10px; font-size: 15px;">How to Measure</h4>
                    <div style="display: grid; gap: 10px; font-size: 13px; line-height: 1.6;">
                        ${sizeGuide.howToMeasure.map((item, index) => `
                            <div style="padding: 10px 12px; border: 1px solid #e4e4e4; border-radius: 8px;">
                                <strong>${index + 1}. ${item.title}</strong>
                                <div>${item.description}</div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;

            return `
                <div style="display: grid; gap: 14px; color: var(--text-secondary);">
                    <p style="margin: 0;">1-3 cm sizing differences may occur.</p>
                    <div style="display: flex; gap: 18px; border-bottom: 1px solid #ddd; align-items: flex-end;">
                        <button
                            type="button"
                            data-size-unit="inches"
                            aria-selected="true"
                            onclick="setSizeGuideUnit('inches')"
                            style="appearance: none; background: transparent; border: 0; padding: 0 0 12px; margin: 0; font: inherit; font-weight: 700; color: #111; border-bottom: 2px solid #111; cursor: pointer;"
                        >
                            Inches
                        </button>
                        <button
                            type="button"
                            data-size-unit="centimeters"
                            aria-selected="false"
                            onclick="setSizeGuideUnit('centimeters')"
                            style="appearance: none; background: transparent; border: 0; padding: 0 0 12px; margin: 0; font: inherit; font-weight: 700; color: #777; border-bottom: 2px solid transparent; cursor: pointer;"
                        >
                            Centimeters
                        </button>
                    </div>
                    ${section('Inches', sizeGuide.inches, 'inches')}
                    ${section('Centimeters', sizeGuide.centimeters, 'centimeters')}
                    ${howToMeasure}
                </div>
            `;
        }

        if (!product) {
            notFound.style.display = 'block';
        } else {
            layout.hidden = false;
            const originalPrice = Number(product.price) || 0;
            const salePrice = getSalePrice(originalPrice);

            document.title = `${product.name} | SAFIRE`;
            document.getElementById('product-name').textContent = product.name;
            document.getElementById('product-price').innerHTML = `<span class="sale-price-row"><span class="sale-price-current">$${formatPrice(salePrice)}</span><span class="sale-price-old">$${formatPrice(originalPrice)}</span></span>`;
            document.getElementById('product-description').textContent = product.description;

            const parsedSections = parseProductDetailSections(product.details, product.careInstructions);
            setAccordionSection('note-text', parsedSections.Note, false);
            setAccordionSection('details-text', parsedSections.Details);
            setAccordionSection('model-text', parsedSections.Model);
            setAccordionSection('features-text', parsedSections.Features);
            setAccordionSection('care-text', parsedSections['Care Instructions']);
            setAccordionSection('fabric-text', parsedSections.Fabric);
            setAccordionHTMLSection('size-guide-text', buildSizeGuideHTML(product.sizeGuide));
            setSizeGuideUnit('inches');

            const genderText = parsedSections.Gender || product.gender || '';
            const genderElement = document.getElementById('product-gender');
            const productMetaRow = document.getElementById('product-meta-row');
            if (genderElement) {
                genderElement.textContent = genderText ? `Gender: ${genderText}` : '';
                genderElement.hidden = !genderText;
            }
            if (productMetaRow) {
                productMetaRow.hidden = !genderText && !product.colorways;
            }

            const mainImage = document.getElementById('main-image');
            const thumbRow = document.getElementById('thumbnail-row');
            const colorOptions = document.getElementById('color-options');
            const selectedColorLabel = document.getElementById('selected-color-label');

            let activeImages = [...product.images];
            let activeGalleryImages = [...activeImages];
            let currentImageIndex = 0;
            let selectedColorName = null;
            let selectedColorDisplayName = null;
            const isMeshShortsProduct = product.id === 'mesh-drawstring-shorts';
            const collageUrlCache = new Map();

            function loadImageElement(src) {
                return new Promise((resolve, reject) => {
                    const image = new Image();
                    image.onload = () => resolve(image);
                    image.onerror = () => reject(new Error(`Failed to load ${src}`));
                    image.src = src;
                });
            }

            async function buildCollageFromSources(sources) {
                const safeImages = (Array.isArray(sources) ? sources : []).slice(0, 4);
                if (safeImages.length < 4) return null;

                const cacheKey = safeImages.join('|');
                if (collageUrlCache.has(cacheKey)) {
                    return collageUrlCache.get(cacheKey);
                }

                try {
                    const loaded = await Promise.all(safeImages.map((src) => loadImageElement(src)));
                    const canvas = document.createElement('canvas');
                    const size = 1200;
                    const gap = 8;
                    const cell = Math.floor((size - gap) / 2);
                    canvas.width = size;
                    canvas.height = size;

                    const context = canvas.getContext('2d');
                    if (!context) return null;

                    context.fillStyle = '#ffffff';
                    context.fillRect(0, 0, size, size);

                    const positions = [
                        { x: 0, y: 0 },
                        { x: cell + gap, y: 0 },
                        { x: 0, y: cell + gap },
                        { x: cell + gap, y: cell + gap }
                    ];

                    loaded.forEach((image, index) => {
                        const slot = positions[index];
                        if (!slot) return;

                        context.save();
                        context.beginPath();
                        context.rect(slot.x, slot.y, cell, cell);
                        context.clip();

                        const scale = Math.max(cell / image.width, cell / image.height);
                        const drawWidth = image.width * scale;
                        const drawHeight = image.height * scale;
                        const drawX = slot.x + (cell - drawWidth) / 2;
                        const drawY = slot.y + (cell - drawHeight) / 2;

                        context.drawImage(image, drawX, drawY, drawWidth, drawHeight);
                        context.restore();
                    });

                    context.strokeStyle = '#111111';
                    context.lineWidth = 8;
                    context.strokeRect(0, 0, size, size);

                    return await new Promise((resolve) => {
                        canvas.toBlob((blob) => {
                            if (!blob) {
                                resolve(null);
                                return;
                            }

                            const objectUrl = URL.createObjectURL(blob);
                            collageUrlCache.set(cacheKey, objectUrl);
                            resolve(objectUrl);
                        }, 'image/png');
                    });
                } catch (_error) {
                    return null;
                }
            }

            function getMeshFrontAndBack(images) {
                const safeImages = Array.isArray(images) ? images : [];
                if (safeImages.length >= 2) {
                    return [safeImages[0], safeImages[1]];
                }
                return safeImages.slice(0, 2);
            }

            async function buildMeshFixedCollages() {
                if (!isMeshShortsProduct) return [];

                const collageSetOne = [
                    'images/meshshorts%231.png',
                    'images/meshshort%232.png',
                    'images/meshshorts%233.png',
                    'images/meshshorts%234.png'
                ];
                const collageSetTwo = [
                    'images/meshshort%235.png',
                    'images/meshshorts%236.png',
                    'images/meshshorts%237.png',
                    'images/meshshorts%238.png'
                ];

                const [firstCollage, secondCollage] = await Promise.all([
                    buildCollageFromSources(collageSetOne),
                    buildCollageFromSources(collageSetTwo)
                ]);

                return [firstCollage, secondCollage].filter(Boolean);
            }

            function setMainImage(src, thumbButton, imageIndex = 0) {
                mainImage.src = src;
                mainImage.classList.remove('zoomed');
                currentImageIndex = imageIndex;
                document.querySelectorAll('.thumb').forEach((thumb) => thumb.classList.remove('active'));
                if (thumbButton) thumbButton.classList.add('active');

                // Update active dot and thumbnail states from the canonical index.
                document.querySelectorAll('.dot').forEach((dot, i) => {
                    dot.classList.toggle('active', i === imageIndex);
                });
                document.querySelectorAll('.thumb').forEach((thumb, i) => {
                    thumb.classList.toggle('active', i === imageIndex);
                });
            }

            let isSwipeAnimating = false;
            let didImageSwipe = false;

            function showImageAtIndex(index, options = {}) {
                if (!Array.isArray(activeGalleryImages) || activeGalleryImages.length === 0) return;
                const boundedIndex = Math.max(0, Math.min(index, activeGalleryImages.length - 1));
                if (boundedIndex === currentImageIndex) return;

                const targetThumb = thumbRow.children[boundedIndex] || null;
                const shouldAnimate = !!options.animate && !isSwipeAnimating;
                const direction = options.direction === 'right' ? 'right' : 'left';

                if (!shouldAnimate || typeof mainImage.animate !== 'function') {
                    setMainImage(activeGalleryImages[boundedIndex], targetThumb, boundedIndex);
                    return;
                }

                const exitX = direction === 'left' ? -22 : 22;
                const enterX = direction === 'left' ? 22 : -22;
                isSwipeAnimating = true;

                const exitAnimation = mainImage.animate(
                    [
                        { transform: 'translateX(0)', opacity: 1 },
                        { transform: `translateX(${exitX}px)`, opacity: 0.28 }
                    ],
                    { duration: 140, easing: 'cubic-bezier(0.4, 0, 1, 1)', fill: 'forwards' }
                );

                exitAnimation.onfinish = () => {
                    setMainImage(activeGalleryImages[boundedIndex], targetThumb, boundedIndex);
                    mainImage.animate(
                        [
                            { transform: `translateX(${enterX}px)`, opacity: 0.28 },
                            { transform: 'translateX(0)', opacity: 1 }
                        ],
                        { duration: 220, easing: 'cubic-bezier(0.22, 1, 0.36, 1)', fill: 'forwards' }
                    ).onfinish = () => {
                        isSwipeAnimating = false;
                    };
                };

                exitAnimation.oncancel = () => {
                    isSwipeAnimating = false;
                };
            }

            function renderGalleryFrames(frames) {
                thumbRow.innerHTML = '';
                const dotsDiv = document.getElementById('image-dots');
                dotsDiv.innerHTML = '';

                frames.forEach((src, index) => {
                    const button = document.createElement('button');
                    button.className = `thumb${index === 0 ? ' active' : ''}`;
                    button.type = 'button';
                    button.setAttribute('aria-label', `View image ${index + 1}`);
                    button.innerHTML = `<img src="${src}" alt="${product.name} thumbnail ${index + 1}">`;
                    button.addEventListener('click', () => setMainImage(src, button, index));
                    thumbRow.appendChild(button);
                    
                    const dot = document.createElement('span');
                    dot.className = `dot${index === 0 ? ' active' : ''}`;
                    dot.addEventListener('click', () => setMainImage(src, button, index));
                    dotsDiv.appendChild(dot);
                });
                currentImageIndex = 0;
                mainImage.src = frames[0] || '';
                mainImage.alt = selectedColorName ? `${product.name} - ${selectedColorName}` : product.name;
            }

            function renderThumbnails(images) {
                if (!isMeshShortsProduct) {
                    activeGalleryImages = [...images];
                    renderGalleryFrames(activeGalleryImages);
                    return;
                }

                const frontAndBack = getMeshFrontAndBack(images);
                activeGalleryImages = [...frontAndBack];
                renderGalleryFrames(activeGalleryImages);

                buildMeshFixedCollages().then((collages) => {
                    if (collages.length < 2) return;

                    const currentFrontAndBack = getMeshFrontAndBack(activeImages);
                    if (
                        currentFrontAndBack.length !== frontAndBack.length
                        || currentFrontAndBack.some((src, index) => src !== frontAndBack[index])
                    ) {
                        return;
                    }

                    activeGalleryImages = [...frontAndBack, ...collages];
                    renderGalleryFrames(activeGalleryImages);
                });
            }

            if (Array.isArray(product.colorways) && product.colorways.length > 0) {
                colorOptions.classList.add('visible');

                product.colorways.forEach((colorway, index) => {
                    const colorBtn = document.createElement('button');
                    colorBtn.type = 'button';
                    colorBtn.className = `color-dot${index === 0 ? ' active' : ''}`;
                    colorBtn.style.backgroundColor = colorway.hex;
                    colorBtn.setAttribute('aria-label', `Select ${colorway.name}`);
                    colorBtn.title = colorway.name;
                    colorBtn.value = normalizeValue(colorway.name);

                    colorBtn.addEventListener('click', () => {
                        colorOptions.querySelectorAll('.color-dot').forEach((dot) => dot.classList.remove('active'));
                        colorBtn.classList.add('active');
                        selectedColorName = colorBtn.value;
                        selectedColorDisplayName = colorway.name;
                        if (selectedColorLabel) {
                            selectedColorLabel.textContent = `Color: ${selectedColorDisplayName}`;
                        }
                        activeImages = [...colorway.images];
                        renderThumbnails(activeImages);
                    });

                    colorOptions.appendChild(colorBtn);
                });

                selectedColorName = normalizeValue(product.colorways[0].name);
                selectedColorDisplayName = product.colorways[0].name;
                if (selectedColorLabel) {
                    selectedColorLabel.textContent = `Color: ${selectedColorDisplayName}`;
                }
                activeImages = [...product.colorways[0].images];
            } else if (selectedColorLabel) {
                selectedColorLabel.textContent = '';
            }

            renderThumbnails(activeImages);

            mainImage.addEventListener('click', () => {
                if (didImageSwipe) {
                    didImageSwipe = false;
                    return;
                }
                mainImage.classList.toggle('zoomed');
            });

            let touchStartX = 0;
            let touchStartY = 0;
            let touchCurrentX = 0;
            let touchCurrentY = 0;
            const swipeThreshold = 35;

            mainImage.addEventListener('touchstart', (event) => {
                if (!event.touches || event.touches.length !== 1) return;
                touchStartX = event.touches[0].clientX;
                touchStartY = event.touches[0].clientY;
                touchCurrentX = touchStartX;
                touchCurrentY = touchStartY;
            }, { passive: true });

            mainImage.addEventListener('touchmove', (event) => {
                if (!event.touches || event.touches.length !== 1) return;
                touchCurrentX = event.touches[0].clientX;
                touchCurrentY = event.touches[0].clientY;
                const deltaX = touchCurrentX - touchStartX;
                const deltaY = touchCurrentY - touchStartY;

                if (Math.abs(deltaX) > 8 && Math.abs(deltaX) > Math.abs(deltaY) && event.cancelable) {
                    event.preventDefault();
                }
            }, { passive: false });

            mainImage.addEventListener('touchend', (event) => {
                if (!event.changedTouches || event.changedTouches.length !== 1) return;
                const deltaX = event.changedTouches[0].clientX - touchStartX;
                const deltaY = event.changedTouches[0].clientY - touchStartY;

                // Only treat mostly-horizontal gestures as image swipes.
                if (Math.abs(deltaX) < swipeThreshold || Math.abs(deltaX) <= Math.abs(deltaY)) {
                    return;
                }

                if (deltaX < 0) {
                    didImageSwipe = true;
                    showImageAtIndex(currentImageIndex + 1, { animate: true, direction: 'left' });
                } else {
                    didImageSwipe = true;
                    showImageAtIndex(currentImageIndex - 1, { animate: true, direction: 'right' });
                }
            }, { passive: true });

            let pointerStartX = 0;
            let pointerStartY = 0;
            let activePointerId = null;

            mainImage.addEventListener('pointerdown', (event) => {
                if (event.pointerType === 'mouse' && event.button !== 0) return;
                activePointerId = event.pointerId;
                pointerStartX = event.clientX;
                pointerStartY = event.clientY;
                if (typeof mainImage.setPointerCapture === 'function') {
                    try {
                        mainImage.setPointerCapture(event.pointerId);
                    } catch (_) {
                        // Ignore pointer capture errors on unsupported browsers.
                    }
                }
            });

            mainImage.addEventListener('pointerup', (event) => {
                if (activePointerId !== event.pointerId) return;

                if (typeof mainImage.releasePointerCapture === 'function') {
                    try {
                        mainImage.releasePointerCapture(event.pointerId);
                    } catch (_) {
                        // Ignore pointer capture errors on unsupported browsers.
                    }
                }

                const deltaX = event.clientX - pointerStartX;
                const deltaY = event.clientY - pointerStartY;
                activePointerId = null;

                if (Math.abs(deltaX) < swipeThreshold || Math.abs(deltaX) <= Math.abs(deltaY)) {
                    return;
                }

                if (deltaX < 0) {
                    didImageSwipe = true;
                    showImageAtIndex(currentImageIndex + 1, { animate: true, direction: 'left' });
                } else {
                    didImageSwipe = true;
                    showImageAtIndex(currentImageIndex - 1, { animate: true, direction: 'right' });
                }
            });

            mainImage.addEventListener('pointercancel', (event) => {
                if (activePointerId === event.pointerId) {
                    if (typeof mainImage.releasePointerCapture === 'function') {
                        try {
                            mainImage.releasePointerCapture(event.pointerId);
                        } catch (_) {
                            // Ignore pointer capture errors on unsupported browsers.
                        }
                    }
                    activePointerId = null;
                }
            });

            const sizeGrid = document.getElementById('size-grid');
            let selectedSize = null;

            product.sizes.forEach((size) => {
                const button = document.createElement('button');
                button.type = 'button';
                button.className = 'size-btn';
                button.textContent = size;
                button.value = normalizeValue(size);
                button.addEventListener('click', () => {
                    sizeGrid.querySelectorAll('.size-btn').forEach((item) => item.classList.remove('active'));
                    button.classList.add('active');
                    selectedSize = button.value;
                });
                sizeGrid.appendChild(button);
            });

            document.querySelectorAll('.add-btn').forEach((button) => {
                const cleanButton = button.cloneNode(true);
                button.replaceWith(cleanButton);

                cleanButton.addEventListener('click', () => {
                    const productContainer = cleanButton.closest('.product') || layout;
                    const activeSizeButton = productContainer.querySelector('.size-btn.active');
                    const activeColorButton = productContainer.querySelector('.color-dot.active');

                    const scopedSize = activeSizeButton ? normalizeValue(activeSizeButton.value || activeSizeButton.textContent) : null;
                    const scopedColor = activeColorButton ? normalizeColorKey(activeColorButton.value || activeColorButton.title) : normalizeColorKey(selectedColorName || 'default');

                    if (!scopedSize) {
                        alert('Please select a size first.');
                        return;
                    }

                    addToCart({
                        productId: product.id,
                        name: product.name,
                        color: scopedColor,
                        size: scopedSize,
                        price: salePrice
                    });

                    console.log('[Cart Debug] added key:', `${normalizeColorKey(scopedColor || 'default')}-${String(scopedSize || '').trim().toLowerCase()}`);
                    alert('Added to cart');
                });
            });

            updateCartCount();
        }
    </script>
</body>
</html>
