<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAFIRE Product</title>
    <link rel="icon" type="image/svg+xml" href="images/favicon-diamond.svg">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="site-header">
        <a href="index.html" class="brand">SAFIRE</a>
        <div class="header-right">
            <a href="cart.html" class="cart-link">Cart <span id="cart-count" class="cart-count-badge">0</span></a>
        </div>
    </header>

    <main class="product-page">
        <a href="index.html" class="back-link">← Back to products</a>

        <section class="product-layout product" id="product-layout" hidden>
            <div class="media-stack">
                <div class="main-image-wrap" id="main-image-wrap">
                    <img id="main-image" src="" alt="Product image">
                    <div class="color-options-side" id="color-options"></div>
                </div>
                <div class="image-dots" id="image-dots"></div>
                <div class="thumbnail-row" id="thumbnail-row"></div>
            </div>

            <div class="info">
                <h1 id="product-name"></h1>
                <p class="price" id="product-price"></p>
                <p class="desc" id="product-description"></p>
                <p class="desc" id="selected-color-label" style="margin-top:-4px;font-weight:600;"></p>

                <div>
                    <p style="margin:0 0 8px;font-weight:700;">Select Size</p>
                    <div class="size-grid" id="size-grid"></div>
                </div>

                <button class="add-btn" id="add-to-cart-btn">Add to Cart</button>

                <div class="accordion">
                    <details>
                        <summary>Note</summary>
                        <p id="note-text"></p>
                    </details>
                    <details>
                        <summary>Details</summary>
                        <p id="details-text"></p>
                    </details>
                    <details>
                        <summary>Model</summary>
                        <p id="model-text"></p>
                    </details>
                    <details>
                        <summary>Features</summary>
                        <p id="features-text"></p>
                    </details>
                    <details>
                        <summary>Care Instructions</summary>
                        <p id="care-text"></p>
                    </details>
                    <details>
                        <summary>Fabric</summary>
                        <p id="fabric-text"></p>
                    </details>
                </div>
            </div>
        </section>

        <p id="not-found" style="display:none;color:#666;">Product not found.</p>
    </main>

    <script src="https://js.stripe.com/v3/"></script>
    <script src="js/products.js"></script>
    <script src="js/cart.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const productId = params.get('id');
        const product = products.find((item) => item.id === productId);

        const layout = document.getElementById('product-layout');
        const notFound = document.getElementById('not-found');

        function formatPrice(value) {
            return Math.round(Number(value) || 0).toString();
        }

        function normalizeValue(value) {
            return String(value || '').trim().toLowerCase();
        }

        function normalizeColorKey(value) {
            return normalizeValue(value).split('/')[0].trim().replace(/\s+/g, '-');
        }

        function parseProductDetailSections(detailsText, careText) {
            const raw = String(detailsText || '').replace(/\r/g, '').trim();
            const paragraphs = raw.length > 0
                ? raw.split(/\n\s*\n+/).map((part) => part.trim()).filter(Boolean)
                : [];
            const allLines = raw.length > 0
                ? raw.split('\n').map((line) => line.trim()).filter(Boolean)
                : [];

            const headingKeys = new Set([
                'product code', 'model', 'gender', 'height', 'weight', 'size',
                'effects', 'fit', 'neckline', 'sleeve style', 'sleeve length', 'season', 'style',
                'material', 'fabric weight', 'thickness', 'elasticity', 'breathability'
            ]);

            function normalizeKey(line) {
                return String(line || '').toLowerCase().replace(/:$/, '').trim();
            }

            function isHeadingLine(line) {
                return headingKeys.has(normalizeKey(line));
            }

            function findValueForKey(lines, keyName) {
                const target = normalizeKey(keyName);
                for (let i = 0; i < lines.length; i += 1) {
                    const line = lines[i];
                    const lineKey = normalizeKey(line);
                    if (lineKey !== target) continue;

                    const colonIndex = line.indexOf(':');
                    if (colonIndex !== -1) {
                        const inlineValue = line.slice(colonIndex + 1).trim();
                        if (inlineValue) return inlineValue;
                    }

                    const next = lines[i + 1] ? lines[i + 1].trim() : '';
                    if (next && !isHeadingLine(next)) return next;
                    return '';
                }
                return '';
            }

            const sectionOrder = ['Note', 'Details', 'Model', 'Features', 'Care Instructions', 'Fabric'];
            const sections = {
                Note: '',
                Details: '',
                Model: '',
                Features: '',
                'Care Instructions': String(careText || '').trim(),
                Fabric: ''
            };

            const noteParts = [];
            if (paragraphs[0]) noteParts.push(paragraphs[0]);
            const warningParagraph = paragraphs.find((part) => {
                const value = part.toLowerCase();
                return value.includes('batch variations') || value.includes('minor batch differences') || value.includes('we appreciate your understanding') || value.includes('each piece is handcrafted');
            });
            if (warningParagraph && warningParagraph !== paragraphs[0]) {
                noteParts.push(warningParagraph);
            }
            sections.Note = noteParts.join('\n\n').trim();

            const productCode = findValueForKey(allLines, 'Product Code');
            if (productCode) {
                sections.Details += `Product Code: ${productCode}`;
            }

            const hasModelSignal = allLines.some((line) => normalizeKey(line) === 'model')
                || ['Height', 'Weight', 'Size'].some((key) => Boolean(findValueForKey(allLines, key)));

            const modelPairs = [];
            ['Gender', 'Height', 'Weight', 'Size'].forEach((key) => {
                const value = findValueForKey(allLines, key);
                if (value) modelPairs.push(`${key}: ${value}`);
            });
            if (hasModelSignal && modelPairs.length > 0) {
                sections.Model = modelPairs.join('\n');
            }

            const featurePairs = [];
            ['Effects', 'Fit', 'Neckline', 'Sleeve Style', 'Sleeve Length', 'Season', 'Style'].forEach((key) => {
                const value = findValueForKey(allLines, key);
                if (value) featurePairs.push(`${key}: ${value}`);
            });
            sections.Features = featurePairs.join('\n');

            const fabricPairs = [];
            ['Material', 'Fabric Weight', 'Thickness', 'Elasticity', 'Breathability'].forEach((key) => {
                const value = findValueForKey(allLines, key);
                if (value) fabricPairs.push(`${key}: ${value}`);
            });
            sections.Fabric = fabricPairs.join('\n');

            if (!sections.Details && paragraphs.length > 0) {
                sections.Details = paragraphs[0];
            }

            return sectionOrder.reduce((acc, sectionName) => {
                acc[sectionName] = String(sections[sectionName] || '').trim();
                return acc;
            }, {});
        }

        function setAccordionSection(contentId, text, shouldOpen = false) {
            const contentElement = document.getElementById(contentId);
            if (!contentElement) return;

            const detailsElement = contentElement.closest('details');
            const cleanedText = String(text || '').trim();

            if (!cleanedText) {
                contentElement.textContent = '';
                if (detailsElement) detailsElement.hidden = true;
                return;
            }

            contentElement.textContent = cleanedText;
            if (detailsElement) {
                detailsElement.hidden = false;
                detailsElement.open = !!shouldOpen;
            }
        }

        if (!product) {
            notFound.style.display = 'block';
        } else {
            layout.hidden = false;

            document.title = `${product.name} | SAFIRE`;
            document.getElementById('product-name').textContent = product.name;
            document.getElementById('product-price').textContent = `$${formatPrice(product.price)}`;
            document.getElementById('product-description').textContent = product.description;

            const parsedSections = parseProductDetailSections(product.details, product.careInstructions);
            setAccordionSection('note-text', parsedSections.Note, false);
            setAccordionSection('details-text', parsedSections.Details);
            setAccordionSection('model-text', parsedSections.Model);
            setAccordionSection('features-text', parsedSections.Features);
            setAccordionSection('care-text', parsedSections['Care Instructions']);
            setAccordionSection('fabric-text', parsedSections.Fabric);

            const mainImage = document.getElementById('main-image');
            const thumbRow = document.getElementById('thumbnail-row');
            const colorOptions = document.getElementById('color-options');
            const selectedColorLabel = document.getElementById('selected-color-label');

            let activeImages = [...product.images];
            let currentImageIndex = 0;
            let selectedColorName = null;
            let selectedColorDisplayName = null;

            function setMainImage(src, thumbButton, imageIndex = 0) {
                mainImage.src = src;
                mainImage.classList.remove('zoomed');
                currentImageIndex = imageIndex;
                document.querySelectorAll('.thumb').forEach((thumb) => thumb.classList.remove('active'));
                if (thumbButton) thumbButton.classList.add('active');

                // Update active dot and thumbnail states from the canonical index.
                document.querySelectorAll('.dot').forEach((dot, i) => {
                    dot.classList.toggle('active', i === imageIndex);
                });
                document.querySelectorAll('.thumb').forEach((thumb, i) => {
                    thumb.classList.toggle('active', i === imageIndex);
                });
            }

            function showImageAtIndex(index) {
                if (!Array.isArray(activeImages) || activeImages.length === 0) return;
                const boundedIndex = Math.max(0, Math.min(index, activeImages.length - 1));
                const targetThumb = thumbRow.children[boundedIndex] || null;
                setMainImage(activeImages[boundedIndex], targetThumb, boundedIndex);
            }

            function renderThumbnails(images) {
                thumbRow.innerHTML = '';
                const dotsDiv = document.getElementById('image-dots');
                dotsDiv.innerHTML = '';
                
                images.forEach((src, index) => {
                    const button = document.createElement('button');
                    button.className = `thumb${index === 0 ? ' active' : ''}`;
                    button.type = 'button';
                    button.setAttribute('aria-label', `View image ${index + 1}`);
                    button.innerHTML = `<img src="${src}" alt="${product.name} thumbnail ${index + 1}">`;
                    button.addEventListener('click', () => setMainImage(src, button, index));
                    thumbRow.appendChild(button);
                    
                    const dot = document.createElement('span');
                    dot.className = `dot${index === 0 ? ' active' : ''}`;
                    dot.addEventListener('click', () => setMainImage(src, button, index));
                    dotsDiv.appendChild(dot);
                });
                currentImageIndex = 0;
                mainImage.src = images[0];
                mainImage.alt = selectedColorName ? `${product.name} - ${selectedColorName}` : product.name;
            }

            if (Array.isArray(product.colorways) && product.colorways.length > 0) {
                colorOptions.classList.add('visible');

                product.colorways.forEach((colorway, index) => {
                    const colorBtn = document.createElement('button');
                    colorBtn.type = 'button';
                    colorBtn.className = `color-dot${index === 0 ? ' active' : ''}`;
                    colorBtn.style.backgroundColor = colorway.hex;
                    colorBtn.setAttribute('aria-label', `Select ${colorway.name}`);
                    colorBtn.title = colorway.name;
                    colorBtn.value = normalizeValue(colorway.name);

                    colorBtn.addEventListener('click', () => {
                        colorOptions.querySelectorAll('.color-dot').forEach((dot) => dot.classList.remove('active'));
                        colorBtn.classList.add('active');
                        selectedColorName = colorBtn.value;
                        selectedColorDisplayName = colorway.name;
                        if (selectedColorLabel) {
                            selectedColorLabel.textContent = `Color: ${selectedColorDisplayName}`;
                        }
                        activeImages = [...colorway.images];
                        renderThumbnails(activeImages);
                    });

                    colorOptions.appendChild(colorBtn);
                });

                selectedColorName = normalizeValue(product.colorways[0].name);
                selectedColorDisplayName = product.colorways[0].name;
                if (selectedColorLabel) {
                    selectedColorLabel.textContent = `Color: ${selectedColorDisplayName}`;
                }
                activeImages = [...product.colorways[0].images];
            } else if (selectedColorLabel) {
                selectedColorLabel.textContent = '';
            }

            renderThumbnails(activeImages);

            mainImage.addEventListener('click', () => {
                mainImage.classList.toggle('zoomed');
            });

            let touchStartX = 0;
            let touchStartY = 0;
            const swipeThreshold = 35;

            mainImage.addEventListener('touchstart', (event) => {
                if (!event.touches || event.touches.length !== 1) return;
                touchStartX = event.touches[0].clientX;
                touchStartY = event.touches[0].clientY;
            }, { passive: true });

            mainImage.addEventListener('touchend', (event) => {
                if (!event.changedTouches || event.changedTouches.length !== 1) return;
                const deltaX = event.changedTouches[0].clientX - touchStartX;
                const deltaY = event.changedTouches[0].clientY - touchStartY;

                // Only treat mostly-horizontal gestures as image swipes.
                if (Math.abs(deltaX) < swipeThreshold || Math.abs(deltaX) <= Math.abs(deltaY)) {
                    return;
                }

                if (deltaX < 0) {
                    showImageAtIndex(currentImageIndex + 1);
                } else {
                    showImageAtIndex(currentImageIndex - 1);
                }
            }, { passive: true });

            const sizeGrid = document.getElementById('size-grid');
            let selectedSize = null;

            product.sizes.forEach((size) => {
                const button = document.createElement('button');
                button.type = 'button';
                button.className = 'size-btn';
                button.textContent = size;
                button.value = normalizeValue(size);
                button.addEventListener('click', () => {
                    sizeGrid.querySelectorAll('.size-btn').forEach((item) => item.classList.remove('active'));
                    button.classList.add('active');
                    selectedSize = button.value;
                });
                sizeGrid.appendChild(button);
            });

            document.querySelectorAll('.add-btn').forEach((button) => {
                const cleanButton = button.cloneNode(true);
                button.replaceWith(cleanButton);

                cleanButton.addEventListener('click', () => {
                    const productContainer = cleanButton.closest('.product') || layout;
                    const activeSizeButton = productContainer.querySelector('.size-btn.active');
                    const activeColorButton = productContainer.querySelector('.color-dot.active');

                    const scopedSize = activeSizeButton ? normalizeValue(activeSizeButton.value || activeSizeButton.textContent) : null;
                    const scopedColor = activeColorButton ? normalizeColorKey(activeColorButton.value || activeColorButton.title) : normalizeColorKey(selectedColorName || 'default');

                    if (!scopedSize) {
                        alert('Please select a size first.');
                        return;
                    }

                    addToCart({
                        productId: product.id,
                        name: product.name,
                        color: scopedColor,
                        size: scopedSize,
                        price: product.price
                    });

                    console.log('[Cart Debug] added key:', `${normalizeColorKey(scopedColor || 'default')}-${String(scopedSize || '').trim().toLowerCase()}`);
                    alert('Added to cart');
                });
            });

            updateCartCount();
        }
    </script>
</body>
</html>
