<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAFIRE Cart</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="site-header">
        <a href="index.html" class="brand">SAFIRE</a>
        <div class="header-right">
            <a href="cart.html" class="cart-link">Cart <span id="cart-count" class="cart-count-badge">0</span></a>
        </div>
    </header>

    <main class="cart-page">
        <a href="index.html" class="back-link">← Continue Shopping</a>
        <h1>Shopping Cart</h1>
        <div id="cart-status" style="display:none;margin:12px 0;padding:12px 14px;border-radius:8px;font-weight:600;"></div>

        <section id="cart-items" class="cart-items-list"></section>

        <section class="cart-summary">
            <div class="cart-total-row">
                <strong>Total</strong>
                <strong id="cart-total">$0.00</strong>
            </div>
            <button class="add-btn" type="button" onclick="checkout()">Checkout</button>
        </section>
    </main>

    <script src="https://js.stripe.com/v3/"></script>
    <script src="js/products.js"></script>
    <script src="js/cart.js"></script>
    <script>
        handleCheckoutStatus();
        renderCart();
    </script>
</body>
</html>
