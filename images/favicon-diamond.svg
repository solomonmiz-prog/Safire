<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 260" fill="none">
  <g stroke="#000" stroke-width="12" stroke-linejoin="round" stroke-linecap="round">
    <!-- Top left to top right -->
    <line x1="40" y1="90" x2="100" y2="20"/>
    <line x1="100" y1="20" x2="160" y2="90"/>
    
    <!-- Top section facet lines -->
    <line x1="100" y1="20" x2="70" y2="90"/>
    <line x1="100" y1="20" x2="130" y2="90"/>
    
    <!-- Top right to middle right -->
    <line x1="160" y1="90" x2="130" y2="130"/>
    
    <!-- Top left to middle left -->
    <line x1="40" y1="90" x2="70" y2="130"/>
    
    <!-- Middle horizontal -->
    <line x1="70" y1="130" x2="130" y2="130"/>
    
    <!-- Bottom half lines -->
    <line x1="70" y1="130" x2="100" y2="220"/>
    <line x1="130" y1="130" x2="100" y2="220"/>
    <line x1="40" y1="90" x2="100" y2="220"/>
    <line x1="160" y1="90" x2="100" y2="220"/>
  </g>
</svg>
